<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Quest — Mapa Interactivo de la Huasteca Potosina</title>

  <!-- ESTILOS EXTERNOS:
       Bootstrap y Font Awesome. -->
  <link rel="stylesheet"
        href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css">
  <link rel="stylesheet"
        href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
  <link rel="stylesheet" href="Quest/QStyle.css">
</head>

<body>

  <!-- OVERLAY:
       Capa semitransparente que se muestra detrás de los popups para enfocar
       jQuery lo muestra/oculta junto con los popups. -->
  <div class="overlay hidden" id="overlay" aria-hidden="true"></div>

  <!-- POPUP DE BIENVENIDA:
       Se muestra al cargar Quest.html.
       El contenido se inyecta desde data.json por QScript.js.
       BEM: .welcome-guide -->
  <div class="welcome-guide" id="welcome-guide" role="dialog"
       aria-modal="true" aria-labelledby="guide-welcome-title">

    <!-- IMAGEN:
         El src se asigna dinámicamente por jQuery en QScript.js -->
    <img src="" alt="Guía Xochitl" class="welcome-guide__image" id="guide-image">

    <!-- Texto de bienvenida: inyectado desde data.json (quest.guia.descripcion) -->
    <p class="welcome-guide__text guide-text" id="guide-welcome-title"></p>

    <button class="welcome-guide__btn" id="close-guide" type="button">
      <i class="fa-solid fa-map"></i> Explorar el mapa
    </button>

  </div>

  <!-- CONTENEDOR DEL MAPA:
       La imagen del mapa (.map-container__image) ocupa el fondo.
       BEM: .map-container, .map-container__image -->
  <div class="map-container" id="map-container">

    <img src="IMG/Tour/MapaHP.png"
         alt="Mapa de la Huasteca Potosina"
         class="map-container__image"
         id="map">
    <!-- Los .location-btn se generan aquí dinámicamente por QScript.js a partir de data.json -->

  </div>

  <!-- POPUP DE INFORMACIÓN DE LUGAR:
       Se muestra al hacer clic en un botón de ubicación del mapa.
       BEM: .info-popup -->
  <div id="info-popup" class="info-popup hidden" role="dialog"
       aria-modal="true" aria-labelledby="popup-nombre">

    <!-- Imagen del guía dentro del popup -->
    <img src="" alt="Guía" class="info-popup__guide" id="popup-guide-image">

    <!-- Imagen del lugar seleccionado (src asignado por jQuery desde data.json) -->
    <img src="" alt="" class="info-popup__image" id="popup-imagen">

    <!-- Nombre del lugar: actualizado por jQuery -->
    <h3 class="info-popup__nombre" id="popup-nombre"></h3>

    <!-- Texto informativo del lugar: actualizado por jQuery -->
    <p class="info-popup__texto" id="popup-info"></p>

    <button class="info-popup__btn" id="close-popup" type="button">
      <i class="fa-solid fa-xmark"></i> Cerrar
    </button>

  </div>

  <!-- SCRIPTS: -->
  <script src="https://code.jquery.com/jquery-3.7.1.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
  <script src="Quest/QScript.js"></script>

</body>
</html>
